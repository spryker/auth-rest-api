resource:
    name: AccessTokens
    shortName: access-tokens
    description: 'Creates customer access tokens using username and password credentials.'

    processor: Spryker\Glue\AuthRestApi\Api\Storefront\Processor\AccessTokensStorefrontProcessor
    paginationEnabled: false

    operations:
        - type: Post
          uriTemplate: '/access-tokens'
          description: 'Issues a customer access token using customer credentials (email + password).'
          normalizationContext:
              gen_id: false

    properties:
        username:
            type: string
            writable: true
            readable: false
            required: true
            description: 'Customer email address'
            openapiContext:
                example: 'sonia@spryker.com'

        password:
            type: string
            writable: true
            readable: false
            required: true
            description: 'Customer password'
            openapiContext:
                example: 'change123'

        accessToken:
            type: string
            writable: false
            readable: true
            identifier: true
            description: 'JWT access token for authenticating subsequent API requests'
            openapiContext:
                example: 'eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...'

        tokenType:
            type: string
            writable: false
            readable: true
            description: 'Token type, always Bearer for OAuth 2.0'
            openapiContext:
                example: 'Bearer'

        expiresIn:
            type: integer
            writable: false
            readable: true
            description: 'Token lifetime in seconds from issuance'
            openapiContext:
                example: 3600

        refreshToken:
            type: string
            writable: false
            readable: true
            description: 'Token used to obtain a new access token when the current one expires'
            openapiContext:
                example: 'def50200a1b2c3d4e5f6789012345678901234567890abcdef...'

        idCompanyUser:
            type: string
            writable: false
            readable: true
            description: 'Company user identifier associated with the authenticated customer'
            openapiContext:
                example: 'a4af4d59-3f12-5f37-a0fd-8c21764cf7f9'
