resource:
    name: RefreshTokens
    shortName: refresh-tokens
    description: 'Refreshes access tokens or revokes refresh tokens.'

    processor: Spryker\Glue\AuthRestApi\Api\Storefront\Processor\RefreshTokensStorefrontProcessor
    paginationEnabled: false

    operations:
        - type: Post
          uriTemplate: '/refresh-tokens'
          description: 'Exchanges a valid refresh token for a new pair of access + refresh tokens.'
          normalizationContext:
              gen_id: false

        - type: Delete
          uriTemplate: '/refresh-tokens/{refreshToken}'
          description: 'Revokes a refresh token. Use the special id `mine` to revoke all refresh tokens of the authenticated customer.'
          read: false

    properties:
        refreshToken:
            type: string
            writable: true
            readable: true
            identifier: true
            required: true
            description: 'Refresh token used to obtain a new access token, or to revoke the token when deleting.'
            openapiContext:
                example: 'def50200a1b2c3d4e5f6789012345678901234567890abcdef...'

        tokenType:
            type: string
            writable: false
            readable: true
            description: 'Token type, always Bearer for OAuth 2.0'
            openapiContext:
                example: 'Bearer'

        expiresIn:
            type: integer
            writable: false
            readable: true
            description: 'Token lifetime in seconds from issuance'
            openapiContext:
                example: 3600

        accessToken:
            type: string
            writable: false
            readable: true
            description: 'JWT access token for authenticating subsequent API requests'
            openapiContext:
                example: 'eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiJ9...'
        idCompanyUser:
            type: string
            writable: false
            readable: true
            description: 'Company user identifier associated with the authenticated customer'
            openapiContext:
                example: 'a4af4d59-3f12-5f37-a0fd-8c21764cf7f9'
